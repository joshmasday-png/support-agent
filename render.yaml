services:
  - type: web
    name: storereply-app
    runtime: node
    plan: starter
    region: singapore
    rootDir: .
    buildCommand: npm --prefix frontend install && npm --prefix backend install && npm --prefix backend run build:frontend
    startCommand: npm --prefix backend start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_content,read_online_store_pages,read_legal_policies
      - key: SHOPIFY_API_VERSION
        value: 2025-10
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_AFTER_AUTH_REDIRECT
        sync: false
